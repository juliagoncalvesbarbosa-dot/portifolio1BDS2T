<!DOCTYPE html> <!--indica a linguagem de programação a ser utilizada, nesse caso,o HTML. Deve ser a primeira linha do projeto -->
<html lang="pt-br"> <!-- a abertura do documento, todas as tags\códigos devem ser escritas nesse espaço. -->
<head> <!-- abertura da tag define o cabeçalho do documento. o conteúdo inserido nesse espaço não é visível no navegador, mas contém instruções sobre o conteúdo e comportamento. Dentro dessa tag, podem ser inseridos folhas de estilo e script.-->
    <meta charset="UTF-8"> <!-- especifica qual o conjunto de caracteres (characther set or charset) será usado para renderizar o texto da página. O UTF-8 contém todos os caracteres dos padrões Unicode e ASCII, o mais utilizados em páginas da web. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--fornecem os metadados sobre a pagina para o navegador,-->
    <title>Portifólio</title> <!-- titulo da pagina\documento.-->
</head> <!-- fechamento da tag do cabeçalho.-->
<body> <!-- abertura da tag, marcando o espaço no qual deve estar contido o conteúdo visual da pagina. As demais tags que representam o texto, botões e outros, devem ser adicionadas nesse intervalo.-->
    <!-- Um documento HTML é composto por tags que são escritas entre < >. As tsgs precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como no caso da tag meta. Outro aspecto importante da linguagem é que ela é cas insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minúsculas, sendo assim, as tags podem ser escritas das duas maneiras.-->
<!--No HTML há seis níveis de cabeçalhos\títulos que podem ser usados por meio das tags h1, h2, h3, h4, h5 e h6, sendo o h1 o mais relevante e o h6 o menor\menos relevante.-->
<h1> Matemática</h1>
<h2> Grandezas</h2>
<h3> Unidades de Medidas</h3>
<h4> Comprimento</h4>
<h5> Míltiplos</h5>
<h6> Submúltiplos</h6>
<h1> Teste</h1>

<p> Cria parágrafos para a nossa página.</p>
<p> Julia Gonçalves Barbosa: Eu não aguento mais, socorro, tá facíl, mas eu não gosto</p>
</body>
</html> <!-- fechamento do documento.-->
